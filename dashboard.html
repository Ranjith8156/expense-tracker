<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Expense Tracker — Dashboard</title>
    <meta name="description" content="View your expense summary, filtered analytics, and remaining balance" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="dashboard.css" />
</head>
<body class="dashboard-page">
    <!-- Page Transition Overlay -->
    <div class="page-transition" id="pageTransition">
        <div class="loader-spinner"></div>
    </div>

    <!-- Animated Background -->
    <div class="bg-gradient dashboard-bg"></div>
    <!-- Main Content -->
    <div class="container fade-slide-in">
        <div class="dashboard-header">
            <button class="btn btn-back" onclick="goBack()">
                <span class="btn-icon">←</span>
                <span class="btn-text">Back</span>
            </button>
            <h1 class="neon-title neon-blue">
                <span class="emoji">📊</span>
                Dashboard
            </h1>
        </div>

        <!-- Summary Cards -->
        <div class="cards-grid">
            <div class="summary-card card-salary" id="salaryCard">
                <div class="card-icon">💰</div>
                <div class="card-label">Monthly Salary</div>
                <div class="card-value" id="salaryValue">₹0.00</div>
            </div>
            <div class="summary-card card-total" id="totalCard">
                <div class="card-icon">📉</div>
                <div class="card-label">Total Expense</div>
                <div class="card-value" id="totalValue">₹0.00</div>
            </div>
            <div class="summary-card card-average" id="averageCard">
                <div class="card-icon">📈</div>
                <div class="card-label">Average Expense</div>
                <div class="card-value" id="averageValue">₹0.00</div>
            </div>
            <div class="summary-card card-balance" id="balanceCard">
                <div class="card-icon">🏦</div>
                <div class="card-label">Remaining Balance</div>
                <div class="card-value" id="balanceValue">₹0.00</div>
            </div>
        </div>

        <!-- Filter Buttons -->
        <div class="filter-section glass-card-slim">
            <span class="filter-label">Filter by:</span>
            <div class="filter-buttons">
                <button class="filter-btn active" data-type="all" onclick="filterExpenses('all', this)">All</button>
                <button class="filter-btn" data-type="day" onclick="filterExpenses('day', this)">Today</button>
                <button class="filter-btn" data-type="month" onclick="filterExpenses('month', this)">This Month</button>
                <button class="filter-btn" data-type="year" onclick="filterExpenses('year', this)">This Year</button>
            </div>
        </div>

        <!-- Expenses Table -->
        <div class="table-container glass-card-slim">
            <h2 class="table-title">Expense History</h2>
            <div class="table-wrapper">
                <table id="expenseTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Amount (₹)</th>
                            <th>Category</th>
                            <th>Date & Time</th>
                        </tr>
                    </thead>
                    <tbody id="expenseTableBody">
                        <tr class="empty-row">
                            <td colspan="4">No expenses found</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
